    function toJsDate(value) {
      if (!value) return null;
      if (value instanceof Date) return value;
      if (typeof value?.toDate === 'function') {
        try { return value.toDate(); } catch (_) {}
      }
      if (typeof value === 'string' || typeof value === 'number') {
        const d = new Date(value);
        if (!isNaN(d.getTime())) return d;
      }
      return null;
    }

    // Theme Management Hook
    function useTheme() {
      const [theme, setThemeState] = useState(() => localStorage.getItem('theme') || 'system');
      useEffect(() => {
        const root = document.documentElement;
        const applyTheme = (t) => {
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) root.classList.add('dark');
          else root.classList.remove('dark');
        };
        applyTheme(theme);
        localStorage.setItem('theme', theme);
        if (theme === 'system') {
          const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
          const handler = () => applyTheme('system');
          mediaQuery.addEventListener('change', handler);
          return () => mediaQuery.removeEventListener('change', handler);
        }
      }, [theme]);
      return [theme, setThemeState];
    }

    async function fetchRecentUploads(channelId, maxResults = 12) {
      const chUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${encodeURIComponent(channelId)}&key=${encodeURIComponent(YOUTUBE_API_KEY)}`;
      const ch = await fetchJson(chUrl).catch(()=>null);

      if (!uploadsId) return [];

      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${encodeURIComponent(uploadsId)}&maxResults=${Math.min(50, maxResults)}&key=${encodeURIComponent(YOUTUBE_API_KEY)}`;

      return (js?.items || []).map(it => {
        const sn = it?.snippet || {};
        const vid = it?.contentDetails?.videoId || sn?.resourceId?.videoId;
        if (!vid) return null;
        const thumb = sn?.thumbnails?.maxres?.url || sn?.thumbnails?.high?.url || ytThumb(vid);

      }).filter(Boolean).slice(0, maxResults);
    }

    async function fetchPlaylistItems(playlistId, maxResults = 200) {
      let allItems = []; let pageToken = '';
      while (allItems.length < maxResults) {
        let js;
        try { js = await fetchJson(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${encodeURIComponent(playlistId)}&maxResults=50${pageToken ? '&pageToken='+encodeURIComponent(pageToken) : ''}&key=${encodeURIComponent(YOUTUBE_API_KEY)}`); } 
        catch (e) { if (allItems.length > 0) break; throw e; }
        const batch = (js?.items || []).map((it, i) => {
          const sn = it?.snippet || {};
          const vid = it?.contentDetails?.videoId || sn?.resourceId?.videoId;
          if (!vid) return null;
          const thumb = sn?.thumbnails?.maxres?.url || sn?.thumbnails?.high?.url || ytThumb(vid);
          return { id: it?.id || `${playlistId}-${allItems.length + i}`, videoId: vid, title: sn?.title || 'Untitled', publishedAt: sn?.publishedAt || null, position: sn?.position ?? 999999, thumb, thumbFallback: ytThumb(vid) };
        }).filter(Boolean);
        allItems = allItems.concat(batch);
        pageToken = js?.nextPageToken || '';
        if (!pageToken || batch.length === 0) break;
      }
      return allItems.slice(0, maxResults);
    }

        catch(e) { break; }
        const batch = (js?.items || []).map((pl) => {

        }).filter(Boolean);
        all = all.concat(batch);
        pageToken = js?.nextPageToken || "";
        if (!pageToken) break;
      }
      return all.slice(0, maxPlaylists);
    }
    
    function sortPlaylists(playlists, mode = "custom") {
      const arr = [...(playlists || [])];
      if (mode === "custom") {
        arr.sort((a, b) => {
          const titleA = (a.title || "").trim(), titleB = (b.title || "").trim();
          let idxA = CUSTOM_PLAYLIST_ORDER.findIndex(p => titleA.toLowerCase().includes(p.toLowerCase()));
          let idxB = CUSTOM_PLAYLIST_ORDER.findIndex(p => titleB.toLowerCase().includes(p.toLowerCase()));
          if (idxA === -1) idxA = 9999;
          if (idxB === -1) idxB = 9999;
          if (idxA !== idxB) return idxA - idxB;
          return titleA.localeCompare(titleB);
        });
      }
      return arr;
    }

    function sortVideosNewest(items = []) {
      const seen = new Set();
      return [...items].filter(item => {

        seen.add(key); return true;

    function getLiveShowInfoAST() {
      const now = new Date();
      const ast = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (3600000 * -4));
      const day = ast.getDay(), hr = ast.getHours();
      if (day >= 1 && day <= 4) {
        if (hr >= 6 && hr < 10) return { show: "OMG IN THE MORNING", host: "Bing Smoke & DJ Shady" };
        if (hr >= 10 && hr < 13) return { show: "MILLENNIUM MORNINGS", host: "Millenium Kidd" };
        if (hr >= 13 && hr < 16) return { show: "DISTRICT 106", host: "Jill" };
        if (hr >= 16 && hr < 19) return { show: "THE BOOM DRIVE", host: "Domo & DJ Samo" };
        return { show: "NO MIC NIGHTTIME", host: "Boom Selection" };
      }
      if (day === 5) {
        if (hr >= 6 && hr < 9) return { show: "OMG FRIDAY", host: "Da Fugitive & DJ Shady" };
        if (hr >= 9 && hr < 12) return { show: "BOOM BLAST", host: "Domo & DJ Source" };
        if (hr >= 12 && hr < 15) return { show: "AFTERNOON MIX", host: "DJ Laza & DJ Babajay" };
        if (hr >= 15 && hr < 18) return { show: "WEEKEND WARMUP", host: "DJ Tucker & Chris John" };
        if (hr >= 18 && hr < 21) return { show: "KINGS OF THE NIGHT", host: "Weapon R & Dr King" };
        return { show: "NO MIC WEEKEND", host: "Boom Selection" };
      }
      if (day === 6) {
        if (hr >= 9 && hr < 12) return { show: "CELEBRITY SATURDAY", host: "Supa Dog Pitbull & DJ Lano" };
        if (hr >= 12 && hr < 15) return { show: "AFTERNOON BLAST", host: "Chris John & DJ Babajay" };

        if (hr >= 18 && hr < 21) return { show: "KINGS OF THE NIGHT", host: "Weapon R & Dr King" };
        return { show: "NO MIC WEEKEND", host: "Boom Selection" };

      if (day === 0) {

        return { show: "NO MIC SUNDAY", host: "Boom Selection" };

      return { show: "BOOM 106.9 FM", host: "The Trending Station" };
    }

    function TV() {
      const [tab, setTab] = useState("Mon–Thu");
      const [rightTab, setRightTab] = useState("schedule"); // 'schedule' | 'chat'
      
      const host = typeof window !== 'undefined' ? (window.location.hostname || "localhost").replace(/^www\./, "") : "localhost";
      const twitchSrc = `https://player.twitch.tv/?channel=${encodeURIComponent(TWITCH_CHANNEL)}&parent=${encodeURIComponent(host)}&muted=false&autoplay=true`;

      // Firebase Chat States
      const [messages, setMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [user, setUser] = useState(auth?.currentUser || null);
      const [chatError, setChatError] = useState('');
      const firebaseReady = Boolean(window.firebase && auth && db);
      const activeThreadKey = 'iktv-live';

      useEffect(() => {
        if (!firebaseReady) return;
        const unsubAuth = auth.onAuthStateChanged(u => setUser(u));
        return () => unsubAuth && unsubAuth();
      }, [firebaseReady]);

      useEffect(() => {
        if (!firebaseReady) return;
        setMessages([]);
        const unsub = db.collection('messages')
          .orderBy('createdAt', 'desc')
          .limit(150)
          .onSnapshot(snap => {
            const now = Date.now();
            const oneDayMs = 24 * 60 * 60 * 1000;
            
            const msgs = snap.docs
              .map(d => ({ id: d.id, ...d.data() }))
              .filter(m => {
                if (m.threadKey !== activeThreadKey) return false;
                // If the message is fresh from local cache, keep it. 
                // If it has a server timestamp, filter out anything older than 24 hours.
                if (!m.createdAt) return true; 
                const msgTime = typeof m.createdAt.toMillis === 'function' ? m.createdAt.toMillis() : m.createdAt;
                return (now - msgTime) < oneDayMs;
              })
              .reverse();
            setMessages(msgs);
          }, err => {
            setChatError('Live chat unavailable right now.');
            console.warn(err);
          });
        return () => unsub && unsub();
      }, [firebaseReady, activeThreadKey]);

      const loginForChat = async () => {
        setChatError('');
        if (!firebaseReady) { setChatError('Firebase is not connected.'); return; }
        if (window.location.protocol === 'file:') { setChatError('Sign in requires a real domain (http/https).'); return; }
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          await auth.signInWithPopup(provider);
        } catch (e) {
          if (e?.code === 'auth/unauthorized-domain') setChatError('Domain not authorized in Firebase settings.');
          else setChatError('Login failed. Please try again.');
        }
      };

      const sendChat = async () => {
        const text = chatInput.trim();
        if (!text || !user) return;
        if (db) {
          try {
            await db.collection('messages').add({
              text,
              user: user?.displayName || 'Viewer',
              photoURL: user?.photoURL || '',
              uid: user?.uid || '',
              threadKey: activeThreadKey,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            setChatInput('');
          } catch (e) { setChatError('Could not send message.'); }
        }
      };
      
      return (
        <div className="pt-[72px] min-h-screen flex flex-col">
          <div className="max-w-[1800px] mx-auto w-full px-4 md:px-10 py-6">
            <div className="text-orange-500 font-black italic uppercase tracking-widest text-xs">Live Stream</div>

                    <iframe src={twitchSrc} className="absolute inset-0 w-full h-full" frameBorder="0" allowFullScreen></iframe>
                  </div>
                </div>
              </div>

              {/* Sidebar Tabs: Schedule OR Firebase Chat */}
              <div className="xl:col-span-4 w-full min-w-0 h-full">

                    <div className="flex bg-gray-200 dark:bg-black/50 rounded-lg p-1 shadow-inner border border-gray-300 dark:border-white/5 w-full max-w-[200px] gap-1">
                       <button onClick={() => setRightTab('schedule')} className={`flex-1 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-md transition ${rightTab === 'schedule' ? 'bg-white dark:bg-zinc-700 text-black dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white'}`}>Schedule</button>
                       <button onClick={() => setRightTab('chat')} className={`flex-1 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-md transition flex items-center justify-center gap-1.5 bg-red-600 text-white shadow-md hover:bg-red-500 ${rightTab === 'chat' ? 'animate-none ring-2 ring-red-600/50' : 'animate-pulse'}`}>

    function App() {
      // Setup browser history and routing logic
      const [page, setPageState] = useState(() => {
        try {
          const params = new URLSearchParams(window.location.search);
          return params.get('p') || 'home';
        } catch (e) { return 'home'; }
      });

      useEffect(() => {
        const initialUrl = page === 'home' ? window.location.pathname : `?p=${page}`;
        try {
            window.history.replaceState({ page }, '', initialUrl);
        } catch(e) {
            console.warn("History API blocked. Running memory routing.");
        }
        
        const handlePopState = (e) => {
          if (e.state && e.state.page) {
            setPageState(e.state.page);
            setHoverBackground(null);
          } else {
            setPageState('home');
            setHoverBackground(null);
          }
        };
        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, [page]);

      const navigate = useCallback((newPage) => {
        if (page !== newPage) {
          setHoverBackground(null);
          window.scrollTo(0,0);
          setPageState(newPage);
          const newUrl = newPage === 'home' ? window.location.pathname : `?p=${newPage}`;
          try {
              window.history.pushState({ page: newPage }, '', newUrl);
          } catch(e) {}
        }
      }, [page]);

      const [theme, setTheme] = useTheme();
      const [liveInfo, setLiveInfo] = useState(getLiveShowInfoAST());
      const [radioVisible, setRadioVisible] = useState(false);
      const [teamModalOpen, setTeamModalOpen] = useState(false);
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [legalType, setLegalType] = useState(null);
      const [ytStatus, setYtStatus] = useState({ state: "idle" });
      const [omgChannelResolved, setOmgChannelResolved] = useState(OMG_CHANNEL_ID);
      
      const fallbackContent = useMemo(() => buildFallbackContent(), []);
      const [featuredRows, setFeaturedRows] = useState(fallbackContent.featuredRows);
      const [sceneItems, setSceneItems] = useState(EVENT_FLYERS_FALLBACK);
      const [playlistFolders, setPlaylistFolders] = useState([]);
      const [playlistItemsById, setPlaylistItemsById] = useState({});
      const [ytModal, setYtModal] = useState(null);
      
      const isStandalone = typeof window !== 'undefined' && (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone);
      const isIos = typeof navigator !== 'undefined' && /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());

      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [showInstallBanner, setShowInstallBanner] = useState(!isStandalone);
      const [manualInstallMsg, setManualInstallMsg] = useState("");

      useEffect(() => {
        const handleBeforeInstall = (e) => { e.preventDefault(); setDeferredPrompt(e); };
        window.addEventListener('beforeinstallprompt', handleBeforeInstall);
        if (typeof window !== 'undefined' && window.globalInstallPrompt) setDeferredPrompt(window.globalInstallPrompt);
        return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
      }, []);

      const handleInstallClick = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') { 
            setDeferredPrompt(null); 
            setShowInstallBanner(false); 
          }
        } else if (isIos) {
          setManualInstallMsg("Tap the Share icon below, then select 'Add to Home Screen'");
        } else {
          setManualInstallMsg("Open your browser menu (⋮) and select 'Install App' or 'Add to Home Screen'");
        }
      };

      const ensurePlaylistLoaded = async (id) => {
        if (!id || playlistItemsById[id]) return;
        try { const items = await fetchPlaylistItems(id, 200); setPlaylistItemsById(p => ({ ...p, [id]: items })); } catch (e) {}
      };

      useEffect(() => { 
        const update = () => setLiveInfo(getLiveShowInfoAST()); 
        update(); 
        const t = setInterval(update, 60000); 
        return () => clearInterval(t); 
      }, []);

      useEffect(() => {
        if (!db) {
          setSceneItems(EVENT_FLYERS_FALLBACK);
          return;
        }

        let unsub = null;

        try {
          unsub = db.collection('events').onSnapshot(
            (snap) => {
              const now = new Date();

              const items = snap.docs
                .map(normalizeEventDoc)
                .filter(item => isEventVisible(item, now))
                .sort((a, b) => {
                  const aOrder = Number.isFinite(a.sortOrder) ? a.sortOrder : 9999;
                  const bOrder = Number.isFinite(b.sortOrder) ? b.sortOrder : 9999;
                  return aOrder - bOrder;
                });

              setSceneItems(items.length ? items : EVENT_FLYERS_FALLBACK);
            },
            (err) => {
              console.warn('Firestore events load failed:', err);
              setSceneItems(EVENT_FLYERS_FALLBACK);
            }
          );
        } catch (err) {
          console.warn('Firestore events listener error:', err);
          setSceneItems(EVENT_FLYERS_FALLBACK);
        }

        return () => {
          if (typeof unsub === 'function') unsub();
        };
      }, []);

      useEffect(() => {
        const bgLayer = document.getElementById('bg-layer');
        const overlay = document.getElementById('bg-overlay');
        if (bgLayer) {
          if (page === 'home') bgLayer.classList.remove('dimmed');
          else bgLayer.classList.add('dimmed');
        }
        if (overlay) {
          if (page === 'home') overlay.classList.remove('dimmed');
          else overlay.classList.add('dimmed');
        }
      }, [page]);

      useEffect(() => {
        const run = async () => {
          if (!YOUTUBE_API_KEY) return;
          try {
            const resolvedOmg = await resolveChannelIdSmart({ channelId: OMG_CHANNEL_ID, handle: OMG_CHANNEL_HANDLE });
            setOmgChannelResolved(resolvedOmg);
            const boomId = await resolveChannelIdSmart({ channelId: BOOM_IKTV_CHANNEL_ID });
            const [omgUploads, boomUploads, partnersUploads] = await Promise.all([ fetchRecentUploads(resolvedOmg, 14), fetchRecentUploads(boomId, 40), fetchPlaylistItems(PARTNERS_PLAYLIST_ID, 200) ]);
            const boomPlaylists = await fetchChannelPlaylists(boomId, 60);
            setPlaylistFolders(sortPlaylists(boomPlaylists));
            const featuredFive = [sortVideosNewest(omgUploads)[0], ...sortVideosNewest(boomUploads).slice(0, 4)].filter(Boolean);
            setFeaturedRows([{ title: "Featured Picks", items: featuredFive }]);
            setYtStatus({ state: "ok" });
          } catch (e) { setFeaturedRows(fallbackContent.featuredRows); }
        };
        run();
      }, [fallbackContent]);

      const content = useMemo(() => {
        const latestOmgVideoId = featuredRows?.[0]?.items?.find(v => v.id?.includes('omg'))?.videoId || fallbackContent.featuredRows[0].items[0].videoId;

        if (page === 'home') return <Home navigate={navigate} onListenClick={() => setRadioVisible(true)} featuredRows={featuredRows} onSelectMedia={setYtModal} sceneItems={sceneItems} />;
        if (page === 'tv') return <TV />;
        if (page === 'ondemand') return <OnDemandPage folders={playlistFolders} playlistItemsById={playlistItemsById} ensurePlaylistLoaded={ensurePlaylistLoaded} onPlayEpisode={setYtModal} />;
        if (page === 'omg_live') return <OMGLivePage latestOmgVideoId={latestOmgVideoId} />;
        if (page === 'radio') return <Radio liveInfo={liveInfo} onStart={() => setRadioVisible(true)} />;
        if (page === 'team') return <TeamPage items={teamData} onClickMember={(m) => { setSelectedTeam(m); setTeamModalOpen(true); }} />;
        if (page === 'advertise') return <Advertise />;
        return <Home navigate={navigate} onListenClick={() => setRadioVisible(true)} featuredRows={featuredRows} onSelectMedia={setYtModal} sceneItems={sceneItems} />;
      }, [page, navigate, liveInfo, featuredRows, sceneItems, ytStatus, omgChannelResolved, playlistFolders, playlistItemsById, fallbackContent]);

      return (
        <div className="min-h-screen flex flex-col relative w-full">
          <Header currentPage={page} navigate={navigate} installPrompt={deferredPrompt} handleInstall={handleInstallClick} themeProps={{theme, setTheme}} isStandalone={isStandalone} />
          
          <div className="flex-1">
            {content}
          </div>
          
          {!isStandalone && showInstallBanner && (
            <div className="fixed bottom-24 left-4 right-4 z-[400] bg-orange-500 p-4 rounded-2xl shadow-2xl flex flex-col border-2 border-black animate-[bounce_2s_infinite]">
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-black italic uppercase text-black text-lg leading-none">Install App</div>
                  <div className="text-black/70 text-[10px] font-bold uppercase tracking-widest mt-1">Tap here for fast access</div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setShowInstallBanner(false)} className="bg-black/10 text-black px-3 py-2 rounded-xl"><X size={18} /></button>
                  <button onClick={handleInstallClick} className="bg-black text-white px-5 py-2 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg active:scale-95 transition">Install</button>
                </div>
              </div>
              {manualInstallMsg && (
                <div className="mt-3 pt-3 border-t border-black/20 text-black font-black uppercase text-[10px] tracking-widest text-center animate-none">
                  {manualInstallMsg}
                </div>
              )}
            </div>
          )}
          
          <RadioBar visible={radioVisible} onClose={() => setRadioVisible(false)} liveInfo={liveInfo} />
          {teamModalOpen && <TeamModal member={selectedTeam} onClose={() => { setTeamModalOpen(false); setSelectedTeam(null); }} />}
          {legalType && <LegalModal type={legalType} onClose={() => setLegalType(null)} />}
          <YouTubeModal media={ytModal} onClose={() => setYtModal(null)} />
          
          <footer className="max-w-[1800px] mx-auto w-full px-6 md:px-12 py-8 border-t border-gray-200 dark:border-white/10 mt-12 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] uppercase font-bold tracking-widest text-gray-500 dark:text-gray-500">
            <div className="flex flex-col items-center md:items-start gap-3 text-center md:text-left">
              <div>&copy; 2026 BOOM 106.9 & IKTV</div>
              <div className="flex gap-3 text-gray-600 dark:text-gray-400">
                <a href="mailto:marketing@boom1069.com" className="w-8 h-8 flex items-center justify-center rounded-full bg-white dark:bg-white/10 hover:bg-orange-500 hover:text-black transition-colors shadow-sm"><i className="fa-solid fa-envelope text-sm"></i></a>
                <a href="tel:+17844937831" className="w-8 h-8 flex items-center justify-center rounded-full bg-white dark:bg-white/10 hover:bg-orange-500 hover:text-black transition-colors shadow-sm"><i className="fa-solid fa-phone text-sm"></i></a>
                <a href="https://wa.me/17844937831" target="_blank" rel="noopener noreferrer" className="w-8 h-8 flex items-center justify-center rounded-full bg-white dark:bg-white/10 hover:bg-orange-500 hover:text-black transition-colors shadow-sm"><i className="fa-brands fa-whatsapp text-sm"></i></a>
              </div>
            </div>
            <div className="flex flex-col items-center gap-4">
              <div className="flex flex-wrap justify-center gap-4 md:gap-6">
                <button onClick={() => setLegalType('privacy')} className="hover:text-orange-500 transition">Privacy Policy</button>
                <button onClick={() => setLegalType('terms')} className="hover:text-orange-500 transition">Terms</button>
                <button onClick={() => window.scrollTo({top:0, behavior:'smooth'})} className="hover:text-black dark:hover:text-white transition">Back to Top</button>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    try { 
      ReactDOM.createRoot(document.getElementById('root')).render(<App />); 
    } catch (e) { 
      console.error('BOOT FAILED:', e);
      document.getElementById('fallback').style.display = 'block'; 
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) { 
      window.addEventListener('load', () => { 
        navigator.serviceWorker.register('sw.js').catch(() => {}); 
      }); 
    }
  </script>
</body>
</html>
